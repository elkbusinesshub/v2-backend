# Local development: `docker compose up -d` starts MySQL + Redis.
# `docker compose --profile full up` also builds and runs the API container.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: elk
      MYSQL_DATABASE: elk
    ports:
      # host 3307 → avoids colliding with a locally installed MySQL
      - '3307:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pelk']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # host 6380 → avoids colliding with a locally installed Redis
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    profiles: ['full']
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:elk@mysql:3306/elk
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-compose-secret-do-not-use-in-production-1234
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysqldata:
